name=CI/CD Pipeline

on:
	push:
		branches:
			-main
	pull_request:
		branches:
			-main

jobs:
	build:
		runs-on: ubuntu-latest
		

		steps:
		-name:Checkout code
		 uses: actions/checkout@v1

		-name: Set up Python
		 uses: actions/setup-pyhton@v1
		 with:
			python-version': '3.13.6:

		-name: Install dependencies
		 run: |
			python -m pip install --upgrade pip
			pip install -r requirements.txt

		-name : Train Model
		 run: |
			pyhton model/train.py

		-name: Evaluate Model
		 run: |
			pyhton model/evaluate.py

		-name: Run Unit Tests
		 run: |
			pyhton -m unittest discover -s tests
	